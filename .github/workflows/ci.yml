name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: Tests and deterministic loops
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run tests
        run: python -m pytest

      - name: Check smoke command contract
        run: python -m orchestrator.smoke_contract

      - name: Check artifact contract coverage
        run: python -m orchestrator.artifact_validator_coverage --strict

      - name: Run preflight
        run: python -m orchestrator.preflight --config config/default.json

      - name: Run single evaluation loop
        run: python -m orchestrator.run_loop --run-id ci-single

      - name: Run default iteration loop
        run: python -m orchestrator.iteration_loop --run-id ci-default

      - name: Run iteration dry run
        run: python -m orchestrator.iteration_loop --config config/codex_dry_run.json --run-id ci-dry --max-rounds 1

      - name: Run guarded Codex CLI audit iteration
        run: python -m orchestrator.iteration_loop --config config/codex_cli_guarded.json --run-id ci-codex-guarded --max-rounds 1

      - name: Verify blocked real Codex startup checklist
        run: |
          mkdir -p /tmp/codex-startup-check
          printf '#!/bin/sh\nprintf "codex startup check stub\\n"\n' > /tmp/codex-startup-check/codex
          chmod +x /tmp/codex-startup-check/codex
          export PATH="/tmp/codex-startup-check:$PATH"
          python - <<'PY'
          import json
          import subprocess
          import sys

          result = subprocess.run(
              [
                  sys.executable,
                  "-m",
                  "orchestrator.iteration_loop",
                  "--config",
                  "config/codex_cli_enable_candidate.json",
                  "--run-id",
                  "ci-codex-startup-block",
                  "--max-rounds",
                  "1",
              ],
              capture_output=True,
              text=True,
              check=False,
          )
          combined_output = result.stdout + "\n" + result.stderr
          assert result.returncode != 0, combined_output
          assert "Codex CLI execution preflight failed" in combined_output, combined_output

          run_dir = "experiments/ci-codex-startup-block"
          manifest = json.load(open(f"{run_dir}/manifest.json"))
          checklist = json.load(open(f"{run_dir}/operator_unlock_checklist.json"))
          diff = json.load(open(f"{run_dir}/codex_cli_execution_readiness_diff.json"))
          markdown = open(f"{run_dir}/operator_unlock_checklist.md").read()
          diff_markdown = open(f"{run_dir}/codex_cli_execution_readiness_diff.md").read()
          summary = open(f"{run_dir}/summary.md").read()

          assert manifest["status"] == "failed"
          assert manifest["completed_rounds"] == 0
          assert manifest["operator_unlock_checklist"]["status"] == "blocked"
          assert manifest["operator_unlock_checklist"]["navigation_blocking_count"] == 8, manifest["operator_unlock_checklist"]
          assert manifest["operator_unlock_checklist"]["primary_blocker"] == "primary:operator_unlock_request", manifest["operator_unlock_checklist"]
          assert manifest["operator_unlock_checklist"]["command_hint_count"] == 4, manifest["operator_unlock_checklist"]
          assert manifest["codex_cli_execution_readiness_diff"]["status"] == "missing_evidence", manifest["codex_cli_execution_readiness_diff"]
          assert manifest["codex_cli_execution_readiness_diff"]["ready"] is False, manifest["codex_cli_execution_readiness_diff"]
          assert manifest["codex_cli_execution_readiness_diff"]["missing_artifact_count"] >= 3, manifest["codex_cli_execution_readiness_diff"]
          assert checklist["navigation"]["blocking_count"] == 8
          assert checklist["navigation"]["blocking_items"][0]["related_artifacts"][0]["artifact_id"] == "codex_cli_operator_unlock_request"
          assert checklist["navigation"]["commands"][0]["executes_codex_cli"] is False
          assert diff["schema_version"] == "codex_cli_execution_readiness_diff_v1"
          assert diff["status"] == "missing_evidence"
          assert diff["ready"] is False
          assert diff["summary"]["preflight_ok"] is False
          assert isinstance(
              diff["current_expected_execution"]["config_object_provided"],
              bool,
          )
          assert diff["current_expected_execution"]["source_config"]["path"].endswith(
              "config/codex_cli_enable_candidate.json"
          )
          assert diff["current_expected_execution"]["source_config"]["sha256"]
          assert diff["policy"]["does_not_execute_codex_cli"] is True
          assert "## Blocking Navigation" in markdown
          assert "# Codex CLI Execution Readiness Diff" in diff_markdown
          assert "Primary blocker: `primary:operator_unlock_request`" in summary
          PY
          python -m orchestrator.operator_unlock_checklist experiments/ci-codex-startup-block
          python -m orchestrator.codex_cli_unlock_runbook experiments/ci-codex-startup-block
          test -f experiments/ci-codex-startup-block/codex_cli_unlock_runbook.json
          test -f experiments/ci-codex-startup-block/codex_cli_unlock_runbook.md
          python - <<'PY'
          import json

          runbook = json.load(open("experiments/ci-codex-startup-block/codex_cli_unlock_runbook.json"))
          markdown = open("experiments/ci-codex-startup-block/codex_cli_unlock_runbook.md").read()
          assert runbook["schema_version"] == "codex_cli_unlock_runbook_v1"
          assert runbook["status"] == "needs_artifacts"
          assert runbook["summary"]["step_count"] == 5
          assert runbook["summary"]["next_step_id"] == "step_001_execution_preflight"
          assert all(command["executes_codex_cli"] is False for command in runbook["operator_commands"])
          assert "# Codex CLI Unlock Runbook" in markdown
          PY
          test -f experiments/ci-codex-startup-block/codex_cli_execution_readiness_diff.json
          test -f experiments/ci-codex-startup-block/codex_cli_execution_readiness_diff.md
          python - <<'PY'
          import json

          diff = json.load(open("experiments/ci-codex-startup-block/codex_cli_execution_readiness_diff.json"))
          markdown = open("experiments/ci-codex-startup-block/codex_cli_execution_readiness_diff.md").read()
          assert diff["schema_version"] == "codex_cli_execution_readiness_diff_v1"
          assert diff["status"] == "missing_evidence"
          assert diff["ready"] is False
          assert diff["summary"]["preflight_ok"] is False
          assert diff["policy"]["does_not_execute_codex_cli"] is True
          assert "# Codex CLI Execution Readiness Diff" in markdown
          PY
          python - <<'PY'
          import json
          from pathlib import Path
          import shutil

          probe_run_id = "ci-codex-startup-block"
          shutil.rmtree("experiments/ci-codex-startup-block")
          index_path = Path("experiments/index.jsonl")
          if index_path.exists():
              kept_lines = []
              for line in index_path.read_text(encoding="utf-8").splitlines():
                  if not line.strip():
                      continue
                  payload = json.loads(line)
                  if payload.get("run_id") != probe_run_id:
                      kept_lines.append(line)
              index_path.write_text(
                  "\n".join(kept_lines) + ("\n" if kept_lines else ""),
                  encoding="utf-8",
              )
          history_path = Path("experiments/run_artifact_health_history.jsonl")
          if history_path.exists():
              kept_lines = []
              for line in history_path.read_text(encoding="utf-8").splitlines():
                  if not line.strip():
                      continue
                  payload = json.loads(line)
                  failed_run_ids = {
                      str(row.get("run_id", ""))
                      for row in payload.get("failed_runs", [])
                      if isinstance(row, dict)
                  }
                  if probe_run_id not in failed_run_ids:
                      kept_lines.append(line)
              history_path.write_text(
                  "\n".join(kept_lines) + ("\n" if kept_lines else ""),
                  encoding="utf-8",
              )
          PY

      - name: Run Codex CLI canary iteration
        run: python -m orchestrator.iteration_loop --config config/codex_cli_canary.json --run-id ci-codex-canary --max-rounds 1

      - name: Run adaptive stub iteration
        run: python -m orchestrator.iteration_loop --config config/adaptive_stub.json --run-id ci-adaptive

      - name: Run file-protocol demo iteration
        run: python -m orchestrator.iteration_loop --config config/file_protocol_demo.json --run-id ci-file-protocol-demo --max-rounds 1

      - name: Validate iteration artifacts
        run: |
          python -m orchestrator.external_agent_sandbox_drill experiments/ci-dry
          test -f experiments/ci-dry/external_agent_sandbox_drill.json
          test -f experiments/ci-dry/external_agent_sandbox_drill.md
          python -m orchestrator.experiments sandbox ci-dry > /tmp/codex_dry_sandbox.json
          python - <<'PY'
          import json
          sandbox = json.load(open("/tmp/codex_dry_sandbox.json"))
          quarantine = json.load(open("experiments/ci-dry/round_001/agent_output_quarantine.json"))
          assert sandbox["schema_version"] == "external_agent_sandbox_drill_v1"
          assert sandbox["ok"] is True
          assert sandbox["totals"]["dry_run_only_count"] == 1
          assert sandbox["slots"][0]["command"]["source"] == "proposal"
          assert quarantine["schema_version"] == "agent_output_quarantine_v1"
          assert quarantine["release_to_apply"] is False
          assert quarantine["quarantine_status"] == "not_applicable"
          PY
          python -m orchestrator.artifact_validator ci-dry
          python -m orchestrator.external_agent_sandbox_drill experiments/ci-codex-guarded
          test -f experiments/ci-codex-guarded/external_agent_sandbox_drill.json
          test -f experiments/ci-codex-guarded/external_agent_sandbox_drill.md
          test -f experiments/ci-codex-guarded/codex_cli_execution_preflight.json
          test -f experiments/ci-codex-guarded/round_001/agent_executions/attempt_001_primary.json
          python -m orchestrator.experiments sandbox ci-codex-guarded > /tmp/codex_guarded_sandbox.json
          python - <<'PY'
          import json
          audit = json.load(open("experiments/ci-codex-guarded/round_001/agent_executions/attempt_001_primary.json"))
          quarantine = json.load(open("experiments/ci-codex-guarded/round_001/agent_output_quarantine.json"))
          sandbox = json.load(open("/tmp/codex_guarded_sandbox.json"))
          preflight = json.load(open("experiments/ci-codex-guarded/codex_cli_execution_preflight.json"))
          assert audit["schema_version"] == "agent_execution_v1"
          assert audit["runner_name"] == "codex_cli_guarded_adapter"
          assert audit["status"] == "disabled"
          assert audit["stdin"]["chars"] > 0
          assert quarantine["schema_version"] == "agent_output_quarantine_v1"
          assert quarantine["selected_attempt"]["adapter_name"] == "codex_cli"
          assert quarantine["release_to_apply"] is False
          assert sandbox["schema_version"] == "external_agent_sandbox_drill_v1"
          assert sandbox["ok"] is True
          assert sandbox["slots"][0]["command"]["source"] == "agent_execution"
          assert preflight["schema_version"] == "codex_cli_execution_preflight_v1"
          assert preflight["ok"] is True
          assert preflight["summary"]["real_codex_execute_profile_count"] == 0
          assert preflight["policy"]["blocks_real_codex_without_operator_unlock"] is True
          PY
          python -m orchestrator.codex_cli_contract_fixture experiments/ci-codex-guarded/round_001
          test -f experiments/ci-codex-guarded/round_001/codex_cli_contract_fixture.json
          test -f experiments/ci-codex-guarded/round_001/codex_cli_contract_fixture.md
          test -f experiments/ci-codex-guarded/round_001/agent_attempts/attempt_001_primary/codex_cli_fixture_stdout.json
          test -f experiments/ci-codex-guarded/round_001/agent_attempts/attempt_001_primary/codex_cli_fixture_validation.json
          python - <<'PY'
          import json
          fixture = json.load(open("experiments/ci-codex-guarded/round_001/codex_cli_contract_fixture.json"))
          assert fixture["schema_version"] == "codex_cli_contract_fixture_v1"
          assert fixture["ok"] is True
          assert fixture["failure_code"] == "none"
          assert fixture["checks"]["runner_is_guarded_codex_cli"] is True
          assert fixture["checks"]["stdin_prompt_sha_matches_audit"] is True
          assert fixture["checks"]["fixture_stdout_validation_ok"] is True
          assert fixture["contract"]["execution_status"] == "disabled"
          assert fixture["contract"]["prompt_sha256"] == fixture["contract"]["audit_stdin_sha256"]
          PY
          python -m orchestrator.round_replay experiments/ci-codex-guarded/round_001
          python -m orchestrator.codex_cli_replay_gate experiments/ci-codex-guarded
          test -f experiments/ci-codex-guarded/codex_cli_replay_gate.json
          test -f experiments/ci-codex-guarded/codex_cli_replay_gate.md
          python - <<'PY'
          import json
          gate = json.load(open("experiments/ci-codex-guarded/codex_cli_replay_gate.json"))
          assert gate["schema_version"] == "codex_cli_replay_gate_v1"
          assert gate["ok"] is True
          assert gate["ready_to_enable_codex_cli"] is True
          assert gate["totals"]["blocked_count"] == 0
          assert gate["slots"][0]["requirements"]["contract_fixture_ok"] is True
          assert gate["slots"][0]["requirements"]["round_replay_ok"] is True
          PY
          python -m orchestrator.codex_cli_enablement_gate experiments/ci-codex-guarded --config config/codex_cli_enable_candidate.json
          test -f experiments/ci-codex-guarded/codex_cli_enablement_gate.json
          test -f experiments/ci-codex-guarded/codex_cli_enablement_gate.md
          python - <<'PY'
          import json
          enablement = json.load(open("experiments/ci-codex-guarded/codex_cli_enablement_gate.json"))
          assert enablement["schema_version"] == "codex_cli_enablement_gate_v1"
          assert enablement["ok"] is True
          assert enablement["permitted_to_enable"] is True
          assert enablement["checks"]["execute_true"] is True
          assert enablement["checks"]["replay_gate_ready"] is True
          assert enablement["config"]["enablement"]["manual_confirmation_required"] is True
          PY
          python -m orchestrator.codex_cli_manual_approval experiments/ci-codex-guarded --config config/codex_cli_enable_candidate.json --approved --approved-by ci-approval-fixture --confirmation-phrase "I approve this Codex CLI candidate for manual enablement"
          test -f experiments/ci-codex-guarded/codex_cli_manual_approval.json
          test -f experiments/ci-codex-guarded/codex_cli_manual_approval.md
          python - <<'PY'
          import json
          approval = json.load(open("experiments/ci-codex-guarded/codex_cli_manual_approval.json"))
          assert approval["schema_version"] == "codex_cli_manual_approval_v1"
          assert approval["ok"] is True
          assert approval["manual_approval_granted"] is True
          assert approval["ready_for_controlled_codex_cli_execution"] is True
          assert approval["checks"]["enablement_gate_ok"] is True
          assert approval["checks"]["confirmation_phrase_matches"] is True
          assert approval["policy"]["does_not_execute_codex_cli"] is True
          PY
          python -m orchestrator.codex_cli_real_preflight experiments/ci-codex-guarded --config config/codex_cli_enable_candidate.json
          test -f experiments/ci-codex-guarded/codex_cli_real_preflight.json
          test -f experiments/ci-codex-guarded/codex_cli_real_preflight.md
          python - <<'PY'
          import json
          preflight = json.load(open("experiments/ci-codex-guarded/codex_cli_real_preflight.json"))
          assert preflight["schema_version"] == "codex_cli_real_preflight_v1"
          assert preflight["ok"] is True
          assert preflight["policy"]["does_not_execute_strategy_modification"] is True
          assert preflight["policy"]["does_not_send_strategy_prompt"] is True
          assert preflight["version_probe"]["status"] in {"missing", "completed", "failed", "timeout"}
          if preflight["real_codex_cli_ready"]:
              assert preflight["blocking_reasons"] == []
              assert preflight["checks"]["version_probe_returncode_zero"] is True
          else:
              assert preflight["blocking_reasons"]
          PY
          python -m orchestrator.codex_cli_dry_invocation_guard experiments/ci-codex-guarded --config config/codex_cli_enable_candidate.json
          test -f experiments/ci-codex-guarded/codex_cli_dry_invocation_guard.json
          test -f experiments/ci-codex-guarded/codex_cli_dry_invocation_guard.md
          test -f experiments/ci-codex-guarded/codex_cli_dry_invocation_execution.json
          python - <<'PY'
          import json
          guard = json.load(open("experiments/ci-codex-guarded/codex_cli_dry_invocation_guard.json"))
          audit = json.load(open("experiments/ci-codex-guarded/codex_cli_dry_invocation_execution.json"))
          assert guard["schema_version"] == "codex_cli_dry_invocation_guard_v1"
          assert guard["ok"] is True
          assert guard["execution_requested"] is False
          assert guard["dry_invocation_ready"] is False
          assert "execution_disabled" in guard["blocking_reasons"]
          assert guard["checks"]["prompt_is_harmless"] is True
          assert guard["checks"]["command_is_harmless"] is True
          assert guard["policy"]["does_not_apply_patches"] is True
          assert audit["schema_version"] == "agent_execution_v1"
          assert audit["runner_name"] == "codex_cli_guarded_adapter"
          assert audit["status"] == "disabled"
          assert audit["allowed_mutation_paths"] == []
          assert audit["mutation_guard"]["passed"] is True
          PY
          python -m orchestrator.codex_cli_canary_gate experiments/ci-codex-canary --config config/codex_cli_canary.json
          test -f experiments/ci-codex-canary/codex_cli_canary_gate.json
          test -f experiments/ci-codex-canary/codex_cli_canary_gate.md
          python - <<'PY'
          import json
          gate = json.load(open("experiments/ci-codex-canary/codex_cli_canary_gate.json"))
          preflight = json.load(open("experiments/ci-codex-canary/codex_cli_execution_preflight.json"))
          audit = json.load(open("experiments/ci-codex-canary/round_001/agent_executions/attempt_001_primary.json"))
          quarantine = json.load(open("experiments/ci-codex-canary/round_001/agent_output_quarantine.json"))
          decision = json.load(open("experiments/ci-codex-canary/round_001/decision.json"))
          assert gate["schema_version"] == "codex_cli_canary_gate_v1"
          assert gate["ok"] is True
          assert gate["controlled_execution_ready"] is True
          assert gate["checks"]["execute_true"] is True
          assert gate["checks"]["strategy_rolled_back"] is True
          assert gate["totals"]["ready_count"] == 1
          assert audit["status"] == "completed"
          assert audit["execution_enabled"] is True
          assert audit["command"][0] == "agents/codex_cli_canary.py"
          assert quarantine["release_to_apply"] is True
          assert decision["accepted"] is False
          assert preflight["schema_version"] == "codex_cli_execution_preflight_v1"
          assert preflight["ok"] is True
          assert preflight["summary"]["canary_exempt_count"] == 1
          assert preflight["profiles"][0]["canary_exempt"] is True
          PY
          python -m orchestrator.codex_cli_execution_unlock_gate experiments/ci-codex-guarded --config config/codex_cli_enable_candidate.json --canary-run-dir experiments/ci-codex-canary
          test -f experiments/ci-codex-guarded/codex_cli_execution_unlock_gate.json
          test -f experiments/ci-codex-guarded/codex_cli_execution_unlock_gate.md
          python - <<'PY'
          import json
          gate = json.load(open("experiments/ci-codex-guarded/codex_cli_execution_unlock_gate.json"))
          assert gate["schema_version"] == "codex_cli_execution_unlock_gate_v1"
          assert gate["ok"] is True
          assert gate["real_codex_execution_unlocked"] is False
          assert gate["blocking_reasons"]
          assert "dry_invocation_not_ready" in gate["blocking_reasons"]
          assert "dry_invocation_not_executed" in gate["blocking_reasons"]
          assert gate["checks"]["canary_controlled_execution_ready"] is True
          assert gate["checks"]["candidate_config_binding_consistent"] is True
          assert gate["checks"]["does_not_execute_codex_cli"] is True
          assert gate["config_binding"]["all_matched"] is True
          assert gate["policy"]["read_only"] is True
          assert gate["policy"]["does_not_apply_patches"] is True
          assert gate["policy"]["requires_candidate_config_hash_binding"] is True
          PY
          python -m orchestrator.codex_cli_execution_unlock_snapshot experiments/ci-codex-guarded
          test -f experiments/ci-codex-guarded/codex_cli_execution_unlock_snapshot.json
          test -f experiments/ci-codex-guarded/codex_cli_execution_unlock_snapshot.md
          python - <<'PY'
          import json
          snapshot = json.load(open("experiments/ci-codex-guarded/codex_cli_execution_unlock_snapshot.json"))
          assert snapshot["schema_version"] == "codex_cli_execution_unlock_snapshot_v1"
          assert snapshot["ok"] is True
          assert snapshot["real_codex_execution_unlocked"] is False
          assert len(snapshot["snapshot_digest"]) == 64
          assert snapshot["source_gate"]["exists"] is True
          assert snapshot["evidence_artifacts"]["candidate_config"]["exists"] is True
          assert len(snapshot["evidence_artifacts"]["candidate_config"]["sha256"]) == 64
          assert snapshot["policy"]["freezes_unlock_gate_sha256"] is True
          assert snapshot["policy"]["freezes_evidence_artifact_sha256"] is True
          PY
          python -m orchestrator.codex_cli_execution_candidate experiments/ci-codex-guarded
          test -f experiments/ci-codex-guarded/codex_cli_execution_candidate.json
          test -f experiments/ci-codex-guarded/codex_cli_execution_candidate.md
          python - <<'PY'
          import json
          candidate = json.load(open("experiments/ci-codex-guarded/codex_cli_execution_candidate.json"))
          assert candidate["schema_version"] == "codex_cli_execution_candidate_v1"
          assert candidate["ok"] is True
          assert candidate["execution_candidate_ready"] is False
          assert "unlock_snapshot_not_unlocked" in candidate["blocking_reasons"]
          assert candidate["execution_plan"]["target_file"] == "strategies/current_strategy.py"
          assert candidate["execution_plan"]["allowed_mutation_paths"] == ["strategies/current_strategy.py"]
          assert candidate["execution_plan"]["execution_enabled_by_this_artifact"] is False
          assert candidate["policy"]["does_not_execute_codex_cli"] is True
          assert candidate["policy"]["does_not_create_workspace"] is True
          PY
          python -m orchestrator.codex_cli_real_execution_dry_run experiments/ci-codex-guarded
          test -f experiments/ci-codex-guarded/codex_cli_real_execution_dry_run.json
          test -f experiments/ci-codex-guarded/codex_cli_real_execution_dry_run.md
          python - <<'PY'
          import json
          dry_run = json.load(open("experiments/ci-codex-guarded/codex_cli_real_execution_dry_run.json"))
          assert dry_run["schema_version"] == "codex_cli_real_execution_dry_run_v1"
          assert dry_run["ok"] is True
          assert dry_run["real_execution_dry_run_ready"] is False
          assert "execution_candidate_not_ready" in dry_run["blocking_reasons"]
          assert dry_run["dry_run_result"]["execution_performed"] is False
          assert dry_run["dry_run_result"]["subprocess_invoked"] is False
          assert dry_run["dry_run_result"]["workspace_created"] is False
          assert dry_run["policy"]["does_not_execute_codex_cli"] is True
          assert dry_run["policy"]["does_not_create_workspace"] is True
          PY
          python -m orchestrator.codex_cli_readiness_summary experiments/ci-codex-guarded
          test -f experiments/ci-codex-guarded/codex_cli_readiness_summary.json
          test -f experiments/ci-codex-guarded/codex_cli_readiness_summary.md
          python - <<'PY'
          import json
          summary = json.load(open("experiments/ci-codex-guarded/codex_cli_readiness_summary.json"))
          assert summary["schema_version"] == "codex_cli_readiness_summary_v1"
          assert summary["ok"] is True
          assert summary["readiness_status"] == "blocked"
          assert summary["final_ready"] is False
          assert len(summary["stages"]) == 10
          assert "codex_cli_real_execution_dry_run" in summary["blocked_stages"]
          assert any(reason == "codex_cli_real_execution_dry_run:execution_candidate_not_ready" for reason in summary["aggregate_blocking_reasons"])
          assert summary["policy"]["does_not_execute_codex_cli"] is True
          PY
          python -m orchestrator.codex_cli_readiness_pipeline experiments/ci-codex-guarded --config config/codex_cli_enable_candidate.json --canary-run-dir experiments/ci-codex-canary --approved --approved-by ci-approval-fixture --confirmation-phrase "I approve this Codex CLI candidate for manual enablement"
