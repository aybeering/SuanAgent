          health = json.load(open("/tmp/run_artifact_health.json"))
          history = json.load(open("/tmp/run_artifact_health_history.json"))
          experiment_history = json.load(open("/tmp/experiment_health_history.json"))
          diagnostics = json.load(open("/tmp/memory_diagnostics.json"))
