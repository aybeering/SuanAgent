          python -m orchestrator.run_artifact_health --history-summary > /tmp/run_artifact_health_history.json
          python -m orchestrator.experiments health-history > /tmp/experiment_health_history.json
          python -m orchestrator.memory_diagnostics --strict > /tmp/memory_diagnostics.json
