          assert health["totals"]["failed_count"] == 0
          assert health["totals"]["run_count"] >= 6
          assert history["schema_version"] == "run_artifact_health_history_v1"
          assert history["ok"] is True
          assert history["record_count"] == 1
          assert history["totals"]["records_with_failures"] == 0
          assert experiment_history["schema_version"] == "run_artifact_health_history_v1"
          assert diagnostics["schema_version"] == "memory_diagnostics_v1"
          assert diagnostics["ok"] is True
          assert diagnostics["policy"]["does_not_change_acceptance"] is True
          assert diagnostics["policy"]["does_not_route_agents"] is True
          assert experiment_diagnostics["schema_version"] == "memory_diagnostics_v1"
          PY
