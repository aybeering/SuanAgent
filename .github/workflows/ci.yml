name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: Tests and deterministic loops
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run tests
        run: python -m pytest

      - name: Run preflight
        run: python -m orchestrator.preflight --config config/default.json

      - name: Run single evaluation loop
        run: python -m orchestrator.run_loop --run-id ci-single

      - name: Run iteration dry run
        run: python -m orchestrator.iteration_loop --config config/codex_dry_run.json --run-id ci-dry --max-rounds 1

      - name: Run guarded Codex CLI audit iteration
        run: python -m orchestrator.iteration_loop --config config/codex_cli_guarded.json --run-id ci-codex-guarded --max-rounds 1

      - name: Run adaptive stub iteration
        run: python -m orchestrator.iteration_loop --config config/adaptive_stub.json --run-id ci-adaptive

      - name: Run file-protocol demo iteration
        run: python -m orchestrator.iteration_loop --config config/file_protocol_demo.json --run-id ci-file-protocol-demo --max-rounds 1

      - name: Validate iteration artifacts
        run: |
          python -m orchestrator.external_agent_sandbox_drill experiments/ci-dry
          test -f experiments/ci-dry/external_agent_sandbox_drill.json
          test -f experiments/ci-dry/external_agent_sandbox_drill.md
          python -m orchestrator.experiments sandbox ci-dry > /tmp/codex_dry_sandbox.json
          python - <<'PY'
          import json
          sandbox = json.load(open("/tmp/codex_dry_sandbox.json"))
          assert sandbox["schema_version"] == "external_agent_sandbox_drill_v1"
          assert sandbox["ok"] is True
          assert sandbox["totals"]["dry_run_only_count"] == 1
          assert sandbox["slots"][0]["command"]["source"] == "proposal"
          PY
          python -m orchestrator.artifact_validator ci-dry
          python -m orchestrator.external_agent_sandbox_drill experiments/ci-codex-guarded
          test -f experiments/ci-codex-guarded/external_agent_sandbox_drill.json
          test -f experiments/ci-codex-guarded/external_agent_sandbox_drill.md
          test -f experiments/ci-codex-guarded/round_001/agent_executions/attempt_001_primary.json
          python -m orchestrator.experiments sandbox ci-codex-guarded > /tmp/codex_guarded_sandbox.json
          python - <<'PY'
          import json
          audit = json.load(open("experiments/ci-codex-guarded/round_001/agent_executions/attempt_001_primary.json"))
          sandbox = json.load(open("/tmp/codex_guarded_sandbox.json"))
          assert audit["schema_version"] == "agent_execution_v1"
          assert audit["runner_name"] == "codex_cli_guarded_adapter"
          assert audit["status"] == "disabled"
          assert audit["stdin"]["chars"] > 0
          assert sandbox["schema_version"] == "external_agent_sandbox_drill_v1"
          assert sandbox["ok"] is True
          assert sandbox["slots"][0]["command"]["source"] == "agent_execution"
          PY
          python -m orchestrator.artifact_validator ci-codex-guarded
          python -m orchestrator.artifact_validator ci-adaptive
          python -m orchestrator.artifact_validator ci-file-protocol-demo
          python - <<'PY'
          import json
          decision = json.load(open("experiments/ci-adaptive/round_001/decision.json"))
          assert decision["failure_code"] != ""
          attempts = json.load(open("experiments/ci-adaptive/round_001/proposal_attempts.json"))
          assert "failure_code" in attempts[0]
          assert "routing_prior" in attempts[0]
          leaderboard = json.load(open("experiments/ci-adaptive/candidate_leaderboard.json"))
          assert "failure_stage" in leaderboard[0]
          stats = json.load(open("experiments/ci-adaptive/agent_result_stats.json"))
          assert stats["schema_version"] == "agent_result_stats_v1"
          assert stats["agents"]
          executor = json.load(open("experiments/ci-adaptive/round_001/agent_executor_report.json"))
          assert executor["schema_version"] == "agent_executor_v1"
          assert executor["selected_attempt_id"]
          assert executor["execution_policy"]["mode"] == "sequential"
          assert executor["execution_policy"]["max_candidates"] == 0
          assert executor["execution_policy"]["per_agent_timeout_seconds"] == 120
          workspace = json.load(open("experiments/ci-file-protocol-demo/round_001/workspace_manifest.json"))
          assert workspace["attempt_id"] == "attempt_001_primary"
          assert "attempt_001_primary" in workspace["workspace_path"]
          assert open("experiments/ci-file-protocol-demo/round_001/agent_attempts/attempt_001_primary/workspace_manifest.json").read()
          assert open("experiments/ci-file-protocol-demo/round_001/agent_attempts/attempt_001_primary/agent_execution.json").read()
          PY

      - name: Inspect proposal intent artifacts
        run: |
          test -f experiments/ci-adaptive/round_001/proposal_intent.json
          test -f experiments/ci-adaptive/round_001/proposal_intent.md
          python - <<'PY'
          import json
          payload = json.load(open("experiments/ci-adaptive/round_001/proposal_intent.json"))
          assert payload["schema_version"] == "proposal_intent_v1"
          assert payload["recommended_direction"]
          PY

      - name: Replay demo agent input
        run: |
          python -m orchestrator.agent_replay \
            experiments/ci-file-protocol-demo/round_001/agent_input.json \
            --output experiments/ci-file-protocol-demo/round_001/replayed_agent_output.json \
            --validate
          test -f experiments/ci-file-protocol-demo/round_001/replayed_agent_output.json

      - name: Validate raw demo agent output
        run: |
          python -m orchestrator.agent_output_intake \
            experiments/ci-file-protocol-demo/round_001/agent_input.json \
            experiments/ci-file-protocol-demo/round_001/replayed_agent_output.json \
            --output experiments/ci-file-protocol-demo/round_001/replayed_agent_validation.json
          test -f experiments/ci-file-protocol-demo/round_001/replayed_agent_validation.json

      - name: Replay selected attempt
        run: |
          python -m orchestrator.attempt_replay \
            experiments/ci-file-protocol-demo/round_001/agent_attempts/attempt_001_primary
          test -f experiments/ci-file-protocol-demo/round_001/agent_attempts/attempt_001_primary/attempt_replay.json
          python -m orchestrator.artifact_validator ci-file-protocol-demo
          python - <<'PY'
          import json
          replay = json.load(open("experiments/ci-file-protocol-demo/round_001/agent_attempts/attempt_001_primary/attempt_replay.json"))
          assert replay["failure_code"] == "none"
          assert replay["probe"]["failure_code"] == "none"
          PY

      - name: Replay planned round
        run: |
          python -m orchestrator.round_replay experiments/ci-file-protocol-demo/round_001
          test -f experiments/ci-file-protocol-demo/round_001/round_replay.json
          test -f experiments/ci-file-protocol-demo/round_001/round_replay.md
          python -m orchestrator.artifact_validator ci-file-protocol-demo
          python - <<'PY'
          import json
          replay = json.load(open("experiments/ci-file-protocol-demo/round_001/round_replay.json"))
          assert replay["schema_version"] == "round_replay_v1"
          assert replay["failure_code"] == "none"
          assert replay["planned_attempt_count"] == replay["manifest_attempt_count"] == 1
          assert replay["attempts"][0]["plan_matches_manifest"] is True
          PY
          python -m orchestrator.experiments agents ci-file-protocol-demo > /tmp/agent_stats_with_replay.json
          python - <<'PY'
          import json
          stats = json.load(open("/tmp/agent_stats_with_replay.json"))
          assert stats["round_replays"]["replayed_round_count"] == 1
          assert stats["round_replays"]["rounds"][0]["attempts"][0]["plan_matches_manifest"] is True
          PY
          python -m orchestrator.agent_slot_health experiments/ci-file-protocol-demo
          test -f experiments/ci-file-protocol-demo/agent_slot_health.json
          test -f experiments/ci-file-protocol-demo/agent_slot_health.md
          python -m orchestrator.experiments slots ci-file-protocol-demo > /tmp/agent_slot_health.json
          python - <<'PY'
          import json
          health = json.load(open("/tmp/agent_slot_health.json"))
          assert health["schema_version"] == "agent_slot_health_v1"
          assert health["totals"]["healthy_count"] == 1
          assert health["slots"][0]["workspace_manifest_present"] is True
          assert health["slots"][0]["agent_execution_present"] is True
          PY
          python -m orchestrator.agent_slot_readiness_gate experiments/ci-file-protocol-demo
          test -f experiments/ci-file-protocol-demo/agent_slot_readiness_gate.json
          test -f experiments/ci-file-protocol-demo/agent_slot_readiness_gate.md
          python -m orchestrator.experiments readiness ci-file-protocol-demo > /tmp/agent_slot_readiness_gate.json
          python - <<'PY'
          import json
          readiness = json.load(open("/tmp/agent_slot_readiness_gate.json"))
          assert readiness["schema_version"] == "agent_slot_readiness_gate_v1"
          assert readiness["ok"] is True
          assert readiness["totals"]["ready_count"] == 1
          assert readiness["slots"][0]["requirements"]["replay_ok"] is True
          PY
          python -m orchestrator.external_agent_sandbox_drill experiments/ci-file-protocol-demo
          test -f experiments/ci-file-protocol-demo/external_agent_sandbox_drill.json
          test -f experiments/ci-file-protocol-demo/external_agent_sandbox_drill.md
          python -m orchestrator.experiments sandbox ci-file-protocol-demo > /tmp/file_protocol_sandbox.json
          python - <<'PY'
          import json
          sandbox = json.load(open("/tmp/file_protocol_sandbox.json"))
          assert sandbox["schema_version"] == "external_agent_sandbox_drill_v1"
          assert sandbox["ok"] is True
          assert sandbox["totals"]["subprocess_executed_count"] == 1
          assert sandbox["slots"][0]["execution_audit"]["status"] == "completed"
          PY
          python -m orchestrator.artifact_validator ci-file-protocol-demo

      - name: Inspect research brief artifacts
        run: |
          test -f experiments/ci-adaptive/research_brief.json
          test -f experiments/ci-adaptive/research_brief.md
          python - <<'PY'
          import json
          payload = json.load(open("experiments/ci-adaptive/research_brief.json"))
          assert payload["schema_version"] == "research_brief_v1"
          assert payload["run_id"] == "ci-adaptive"
          assert payload["top_candidates"]
          PY

      - name: Diagnose iteration runs
        run: |
          python -m orchestrator.experiments diagnose ci-adaptive
          python -m orchestrator.experiments diagnose ci-file-protocol-demo

      - name: Compare experiment runs
        run: python -m orchestrator.experiments compare ci-dry ci-adaptive

      - name: Inspect champion registry
        run: |
          python -m orchestrator.experiments promote ci-dry ci-adaptive
          python -m orchestrator.experiments champion

      - name: Summarize local experiments
        run: python -m orchestrator.experiments summary

      - name: Inspect proposal memory
        run: python -m orchestrator.experiments memory --limit 5

      - name: Inspect candidate leaderboard
        run: python -m orchestrator.experiments candidates ci-adaptive --limit 5

      - name: Inspect agent result stats
        run: python -m orchestrator.experiments agents ci-adaptive
